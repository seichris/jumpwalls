<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jump Walls!</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <div class="brand">
          <img class="brand-icon" src="./assets/icons/icon-32.png" alt="" width="22" height="22" />
          <h1>Jump Walls!</h1>
        </div>
        <button id="open-options-btn" type="button" class="secondary icon-button" aria-label="Open settings" title="Settings">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.66 1.66 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.66 1.66 0 0 0-1.82-.33 1.66 1.66 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.66 1.66 0 0 0-1-1.51 1.66 1.66 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.66 1.66 0 0 0 .33-1.82 1.66 1.66 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.66 1.66 0 0 0 1.51-1 1.66 1.66 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.66 1.66 0 0 0 1.82.33h.01a1.66 1.66 0 0 0 .99-1.51V3a2 2 0 0 1 4 0v.09a1.66 1.66 0 0 0 1 1.51h.01a1.66 1.66 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.66 1.66 0 0 0-.33 1.82v.01a1.66 1.66 0 0 0 1.51.99H21a2 2 0 0 1 0 4h-.09a1.66 1.66 0 0 0-1.51 1z"
            ></path>
          </svg>
        </button>
      </header>

      <nav class="tabs">
        <button id="tab-requester-btn" type="button" class="tab active">Request</button>
        <button id="tab-offerer-btn" type="button" class="tab">Offer</button>
      </nav>

      <section id="tab-requester" class="tab-panel active">
        <p class="section-caption">Post a request.</p>
        <form id="post-request-form" class="form">
          <label>
            Source URL
            <input id="source-uri-input" name="sourceURI" required />
          </label>
          <label>
            Question
            <textarea id="question-input" name="question" rows="3" required></textarea>
          </label>
          <div class="form-row">
            <label>
              Currency
              <select id="payment-token-input" name="paymentToken" required>
                <option value="USDC" selected>USDC</option>
                <option value="ETH">ETH</option>
              </select>
            </label>
            <label>
              <span id="max-amount-label">Max Amount in $US</span>
              <input id="max-amount-input" name="maxAmount" inputmode="decimal" placeholder="25.00" required />
            </label>
          </div>
          <button id="post-request-btn" type="submit">Post Request</button>
        </form>
        <pre id="request-result" class="result hidden"></pre>
      </section>

      <section id="tab-offerer" class="tab-panel">
        <p class="section-caption">Open requests. Choose one to make on offer!</p>
        <section class="card">
          <p id="match-summary">Matched requests: 0</p>
          <p id="open-summary" class="subtle">Open requests: 0</p>
          <ul id="matched-list" class="list"></ul>
        </section>

        <form id="post-offer-form" class="form">
          <select id="offer-request-id-select" name="requestId" class="hidden-select" aria-hidden="true" tabindex="-1"></select>
          <p id="offer-request-selection" class="subtle">Select an open request above.</p>
          <div class="form-row">
            <label>
              Currency
              <select id="offer-currency-input" name="currency" required>
                <option value="USDC" selected>USDC</option>
                <option value="ETH">ETH</option>
              </select>
            </label>
            <label>
              <span id="offer-amount-label">Amount in $US</span>
              <input id="offer-amount-input" name="amount" inputmode="decimal" placeholder="25.00" required />
            </label>
          </div>
          <label>
            ETA (minutes)
            <input id="offer-eta-input" name="etaMinutes" inputmode="numeric" required />
          </label>
          <!--
          <label>
            Proof Type
            <input id="offer-proof-input" name="proofType" value="reputation-only" required />
          </label>
          -->
          <button id="post-offer-btn" type="submit">Post Offer</button>
        </form>
        <pre id="offer-result" class="result hidden"></pre>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
