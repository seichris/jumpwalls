<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jump Walls! Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="options-page">
    <main class="panel">
      <header class="panel-header">
        <div class="brand">
          <img src="./assets/icons/icon-32.png" alt="" width="22" height="22" />
          <h1>Jump Walls! Settings</h1>
        </div>
      </header>

      <section class="card">
        <p id="contract-label" class="mono">Contract info unavailable.</p>
        <p id="settings-api-label" class="mono subtle">API unavailable.</p>
      </section>

      <form id="settings-form" class="form settings-form">
        <label id="subscription-overrides-label" class="section-caption subscriptions-label">My Subscriptions</label>
        <section class="card subscription-overrides-card" aria-labelledby="subscription-overrides-label">
          <p class="subtle">
            Mark domains where you have a subscription. Requests from these domains will match even without browsing history.
          </p>
          <ul id="subscription-domain-list" class="list"></ul>
        </section>

        <details class="card advanced-settings">
          <summary>Advanced Settings</summary>
          <div class="advanced-settings-content">
            <label>
              API URL
              <input id="api-url-input" name="apiUrl" required />
            </label>
            <label>
              History lookback (days)
              <input id="history-lookback-input" name="historyLookbackDays" type="number" min="1" max="365" required />
            </label>
            <label class="checkbox">
              <input id="share-demand-signals-input" name="shareDemandSignals" type="checkbox" />
              <span>Share anonymous domain demand signals</span>
            </label>
          </div>
        </details>

        <button id="save-settings-btn" type="submit">Save Settings</button>
      </form>

      <pre id="settings-result" class="result hidden"></pre>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
